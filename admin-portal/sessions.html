<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3Line Store — Sessions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Poppins:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <template id="page-template">
      <div class="panelHeader">
        <div class="showingLabel">Showing: <strong>All Sessions</strong></div>
        <button class="adminActionBtn" id="addSessionBtnTop" type="button">
          <img class="adminActionBtn__icon" src="./assets/plus.svg" alt="" />
          <span>Add New Session</span>
        </button>
      </div>

      <section class="cardSection cardSection--large" id="sessionsEmpty">
        <div class="emptyState__content">
          <img class="emptyState__icon" src="./assets/archive.svg" alt="" />
          <div class="emptyState__title">No Sessions yet</div>
          <div class="emptyState__subtitle">Sessions created will show here</div>
        </div>
      </section>

        <div class="sessionsFilled isHidden" id="sessionsFilled">
          <div class="tableFilterBar">
            <div class="tableFilterBar__left">
              <div class="tableSearch">
                <span class="tableSearch__icon" aria-hidden="true">⌕</span>
                <input class="tableSearch__input" placeholder="Search title" />
              </div>
              <button class="tableFilterBtn" type="button">Date <span aria-hidden="true">▾</span></button>
              <button class="tableApplyBtn" type="button">Apply</button>
            </div>
            <button class="tableExportBtn" type="button">Export</button>
          </div>

          <div class="dataTable">
            <div class="dataTable__head">
              <div>Session</div>
              <div>Start</div>
              <div>End</div>
              <div>Status</div>
              <div>Users</div>
              <div>Date</div>
              <div>Actions</div>
            </div>
            <div class="dataTable__row dataTable__row--clickable">
              <div>End of year</div>
              <div>01/10/2025</div>
              <div>30/12/2025</div>
              <div><span class="statusBadge statusBadge--active">Active</span></div>
              <div>0</div>
              <div>01/10/2025</div>
              <div class="sessions-actions-placeholder"></div>
            </div>
          </div>
        </div>
    </template>

    <script src="./ui.js"></script>
    <script src="./app-layout.js"></script>
    <script>
      renderDashboardShell({ activeKey: "sessions", pageTitle: "Sessions" });

      const params = new URLSearchParams(window.location.search);
      const state = params.get("state");
      const empty = document.getElementById("sessionsEmpty");
      const filled = document.getElementById("sessionsFilled");
      if (state === "filled") {
        empty?.classList.add("isHidden");
        filled?.classList.remove("isHidden");
      }

      document.getElementById("addSessionBtnTop")?.addEventListener("click", () => {
        openAddSessionModal({
          onSubmit: (data) => {
            showSuccessToast("Submitted Successfully");
            
            const empty = document.getElementById("sessionsEmpty");
            const filled = document.getElementById("sessionsFilled");
            const table = document.querySelector("#sessionsFilled .dataTable");
            
            if (empty && filled) {
              empty.classList.add("isHidden");
              filled.classList.remove("isHidden");
            }
            
            if (table && data) {
              const newRow = document.createElement("div");
              newRow.className = "dataTable__row dataTable__row--clickable";
              // We rely on delegation now
              const today = new Date().toLocaleDateString("en-GB");
              
              newRow.innerHTML = `
                <div>${escapeHtml(data.sessionName || "New Session")}</div>
                <div>${escapeHtml(data.startDate || "-")}</div>
                <div>${escapeHtml(data.endDate || "-")}</div>
                <div><span class="statusBadge statusBadge--active">Active</span></div>
                <div>0</div>
                <div>${today}</div>
                <div>${renderTableActions(["View Session", "Edit Session", "Deactivate", "Delete Session"])}</div>
              `;
              table.appendChild(newRow);
            }
          },
        });
      });

      // Initialize sample row actions
      document.querySelectorAll(".sessions-actions-placeholder").forEach(el => {
        el.innerHTML = renderTableActions(["View Session", "Edit Session", "Deactivate", "Delete Session"]);
      });

      // Unified Table Delegation (Navigation & Actions)
      document.querySelector(".dataTable")?.addEventListener("click", (e) => {
        const actionItem = e.target.closest(".rowActionItem");
        const dotsInner = e.target.closest(".tableActionDots");
        const row = e.target.closest(".dataTable__row");

        if (actionItem) {
          const action = actionItem.dataset.action;
          const sessionName = row?.querySelector("div:first-child")?.textContent || "Session";
          
          if (action === "view-session") {
            location.href = './session-details.html';
          } else if (action === "delete-session" || action === "deactivate") {
            const isDeactivate = action === "deactivate";
            openDeleteConfirmModal({
              title: isDeactivate ? "Deactivate Session" : "Delete Session",
              message: `Are you sure you want to ${isDeactivate ? "deactivate" : "delete"} "${sessionName}"?`,
              onConfirm: () => {
                deleteRow(actionItem, "sessionsEmpty", "sessionsFilled");
                showToast(`Session ${isDeactivate ? "deactivated" : "deleted"} successfully`, "success");
              }
            });
          }
          return;
        }

        if (dotsInner) return; // toggleRowMenu handled by inline onclick

        if (row && row.classList.contains("dataTable__row--clickable")) {
          location.href = './session-details.html';
        }
      });

      // Simple HTML escaper for dynamic DOM injection
      function escapeHtml(value) {
        return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
