<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3Line Store — Sessions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Poppins:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <template id="page-template">
      <section class="cardSection">
        <h2 class="sectionTitle">Sessions</h2>

        <div class="emptyState" id="sessionsEmpty">
          <div class="emptyState__content">
            <img class="emptyState__icon" src="./assets/archive.svg" alt="" />
            <div class="emptyState__title">No Session yet</div>
            <div class="emptyState__subtitle">Sessions will show here</div>
          </div>

          <button class="primaryButton" id="addSessionBtn" type="button">
            <img class="primaryButton__icon" src="./assets/plus.svg" alt="" />
            <span>Add New Session</span>
          </button>
        </div>

        <div class="sessionsFilled isHidden" id="sessionsFilled">
          <div class="tableFilterBar">
            <div class="tableFilterBar__left">
              <div class="tableSearch">
                <span class="tableSearch__icon" aria-hidden="true">⌕</span>
                <input class="tableSearch__input" placeholder="Search title" />
              </div>
              <button class="tableFilterBtn" type="button">Date <span aria-hidden="true">▾</span></button>
              <button class="tableApplyBtn" type="button">Apply</button>
            </div>
            <button class="tableExportBtn" type="button">Export</button>
          </div>

          <div class="dataTable">
            <div class="dataTable__head">
              <div>Session</div>
              <div>Start</div>
              <div>End</div>
              <div>Status</div>
              <div>Users</div>
              <div>Date</div>
              <div>Actions</div>
            </div>
            <div class="dataTable__row">
              <div>End of year</div>
              <div>01/10/2025</div>
              <div>30/12/2025</div>
              <div>Active</div>
              <div>0</div>
              <div>01/10/2025</div>
              <div><a class="miniIconButton" href="./session-details.html" aria-label="More"><img src="./assets/arrow-right.svg" alt="" /></a></div>
            </div>
          </div>
        </div>
      </section>
    </template>

    <script src="./ui.js"></script>
    <script src="./app-layout.js"></script>
    <script>
      renderDashboardShell({ activeKey: "sessions", pageTitle: "Sessions" });

      const params = new URLSearchParams(window.location.search);
      const state = params.get("state");
      const empty = document.getElementById("sessionsEmpty");
      const filled = document.getElementById("sessionsFilled");
      if (state === "filled") {
        empty?.classList.add("isHidden");
        filled?.classList.remove("isHidden");
      }

      document.getElementById("addSessionBtn")?.addEventListener("click", () => {
        openAddSessionModal({
          onSubmit: (data) => {
            showSuccessToast("Submitted Successfully");
            
            const empty = document.getElementById("sessionsEmpty");
            const filled = document.getElementById("sessionsFilled");
            const table = document.querySelector("#sessionsFilled .dataTable");
            
            if (empty && filled) {
              empty.classList.add("isHidden");
              filled.classList.remove("isHidden");
            }
            
            if (table && data) {
              const newRow = document.createElement("div");
              newRow.className = "dataTable__row";
              const today = new Date().toLocaleDateString("en-GB");
              
              newRow.innerHTML = `
                <div>${escapeHtml(data.sessionName || "New Session")}</div>
                <div>${escapeHtml(data.startDate || "-")}</div>
                <div>${escapeHtml(data.endDate || "-")}</div>
                <div>Active</div>
                <div>0</div>
                <div>${today}</div>
                <div><a class="miniIconButton" href="./session-details.html" aria-label="More"><img src="./assets/arrow-right.svg" alt="" /></a></div>
              `;
              table.appendChild(newRow);
            }
          },
        });
      });

      // Simple HTML escaper for dynamic DOM injection
      function escapeHtml(value) {
        return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
