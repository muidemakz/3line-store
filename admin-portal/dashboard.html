<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3Line Store — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Poppins:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <template id="page-template">
      <div class="statsRow">
              <article class="statCard">
                <div class="statCard__header">
                  <img class="statCard__miniIcon" src="./assets/pie-chart.svg" alt="" />
                </div>
                <div class="statCard__titleRow">
                  <div class="statCard__title">Active Sessions</div>
                </div>
                <div class="statCard__bottom">
                  <div class="statCard__value">0</div>
                  <img class="statCard__arrow" src="./assets/arrow-right.svg" alt="" />
                </div>
              </article>

              <article class="statCard">
                <div class="statCard__header">
                  <img class="statCard__miniIcon" src="./assets/pie-chart.svg" alt="" />
                </div>
                <div class="statCard__titleRow">
                  <div class="statCard__title">Total Items</div>
                </div>
                <div class="statCard__bottom">
                  <div class="statCard__value">0</div>
                  <img class="statCard__arrow" src="./assets/arrow-right.svg" alt="" />
                </div>
              </article>

              <article class="statCard">
                <div class="statCard__header">
                  <img class="statCard__miniIcon" src="./assets/pie-chart.svg" alt="" />
                </div>
                <div class="statCard__titleRow">
                  <div class="statCard__title">Total Users</div>
                </div>
                <div class="statCard__bottom">
                  <div class="statCard__value">0</div>
                  <img class="statCard__arrow" src="./assets/arrow-right.svg" alt="" />
                </div>
              </article>
      </div>

      <div class="contentRow">
              <section class="cardSection dashboardSettingsCard">
                <h2 class="sectionTitle">Settings</h2>

                <div class="settingsStack">
                  <article class="settingCard">
                    <div class="settingCard__header">
                      <div>
                        <div class="settingCard__title">Point Configuration</div>
                        <div class="settingCard__desc">Adjust the conversion rate between Naira and Store Points.</div>
                      </div>
                      <button class="miniIconButton" type="button" aria-label="Edit" onclick="if(window.openPointConfigModal) window.openPointConfigModal();">
                        <img src="./assets/edit.svg" alt="" />
                      </button>
                    </div>

                    <div class="settingCard__row settingCard__row--highlight">
                      <div class="settingCard__rowLabel">Amount per 1 Point</div>
                      <div class="settingCard__rowValue" id="dash-naira-value">₦-</div>
                    </div>
                  </article>

                  <article class="settingCard">
                    <div class="settingCard__header">
                      <div>
                        <div class="settingCard__title">Grade Levels &amp; Points</div>
                        <div class="settingCard__desc">Manage user grade levels and their associated point allocations.</div>
                      </div>
                      <button class="miniIconButton" type="button" aria-label="Edit" onclick="if(window.openGradeSettingsModal) window.openGradeSettingsModal();">
                        <img src="./assets/edit.svg" alt="" />
                      </button>
                    </div>

                    <div class="settingCard__bigNumber" id="dash-grade-count">0</div>
                  </article>
                </div>
              </section>

              <section class="cardSection dashboardSessionsCard">
                <h2 class="sectionTitle">Active Sessions</h2>

                <div class="emptyState">
                  <div class="emptyState__content">
                    <img class="emptyState__icon" src="./assets/archive.svg" alt="" />
                    <div class="emptyState__title">No Active Session yet</div>
                    <div class="emptyState__subtitle">Active Sessions will show here</div>
                  </div>

                  <button class="primaryButton" id="addSessionBtn" type="button">
                    <img class="primaryButton__icon" src="./assets/plus.svg" alt="" />
                    <span>Add New Session</span>
                  </button>
                </div>
              </section>
            </div>
    </template>

    <script src="./ui.js"></script>
    <script src="./app-layout.js"></script>
    <script>
      renderDashboardShell({ activeKey: "dashboard", pageTitle: "Dashboard" });
      
      document.getElementById("addSessionBtn")?.addEventListener("click", () => {
        openAddSessionModal({
          onSubmit: (data) => {
            showSuccessToast("Session '" + (data.sessionName || "New Session") + "' added successfully!");
            // For a real app, we would refresh the session list here.
            // Since this is a static demo, showing the toast is sufficient.
          }
        });
      });
    </script>
  </body>
</html>
