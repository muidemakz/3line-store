<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3Line Store — Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="authBody">
    <main class="authPage" aria-label="Forgot password">
      <section class="authCard" aria-label="Forgot password form">
        <div class="authForm">
          <header class="authHeader">
            <h1 class="authTitle">Forgot Password</h1>
          </header>

          <form class="authFields" id="forgotPasswordForm" novalidate>
            <label class="field">
              <span class="field__label">Email</span>
              <input
                class="field__input"
                id="email"
                name="email"
                type="email"
                inputmode="email"
                autocomplete="email"
                placeholder="Email"
                required
              />
            </label>

            <button class="authButton" id="submitBtn" type="submit" disabled>Submit</button>
          </form>

          <p class="authAlt">
            <span>I remember my password?</span>
            <a class="authAlt__link" href="./index.html">Sign In</a>
          </p>
        </div>
      </section>

      <footer class="authFooter" aria-label="Footer">
        <small class="authFooter__copy">Copyright &copy; 2026 3Line Store</small>
      </footer>
    </main>

    <script>
      const email = document.getElementById("email");
      const submitBtn = document.getElementById("submitBtn");
      const form = document.getElementById("forgotPasswordForm");

      function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
      }

      function syncButtonState() {
        const ok = isValidEmail(email.value.trim());
        submitBtn.disabled = !ok;
      }

      email.addEventListener("input", syncButtonState);
      syncButtonState();

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        syncButtonState();
        if (submitBtn.disabled) return;
        alert("If this email exists, you’ll receive a reset link shortly.");
        form.reset();
        syncButtonState();
      });
    </script>
  </body>
</html>
