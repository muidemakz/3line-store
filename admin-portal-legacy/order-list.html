<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3Line Store — Order List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Poppins:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <template id="page-template">
      <div class="pageBackRow">
        <a class="pageBack" href="./store.html">
          <span aria-hidden="true">←</span>
          <span>Back</span>
        </a>
      </div>

      <section class="cardSection">
        <h2 class="sectionTitle">Order List</h2>

        <div class="emptyState" id="ordersEmpty">
          <div class="emptyState__content">
            <img class="emptyState__icon" src="./assets/archive.svg" alt="" />
            <div class="emptyState__title">No Orders yet</div>
            <div class="emptyState__subtitle">Orders will show here</div>
          </div>
        </div>

        <div class="ordersFilled isHidden" id="ordersFilled">
          <div class="tableFilterBar">
            <div class="tableFilterBar__left">
              <div class="tableSearch">
                <span class="tableSearch__icon" aria-hidden="true">⌕</span>
                <input class="tableSearch__input" placeholder="Search title" />
              </div>
              <button class="tableFilterBtn" type="button">Date <span aria-hidden="true">▾</span></button>
              <button class="tableApplyBtn" type="button">Apply</button>
            </div>
            <div style="display:flex;gap:8px;">
              <a class="tableExportBtn" href="./shopping-list.html">Shopping List</a>
              <button class="tableExportBtn" type="button">Export</button>
            </div>
          </div>

          <div class="dataTable" id="ordersTable">
            <div class="dataTable__head">
              <div>Order</div>
              <div>Customer</div>
              <div>Items</div>
              <div>Total (PT)</div>
              <div>Status</div>
              <div>Date</div>
              <div>Actions</div>
            </div>
          </div>
        </div>
      </section>
    </template>

    <script src="./store.js"></script>
    <script src="./ui.js"></script>
    <script src="./app-layout.js"></script>
    <script>
      renderDashboardShell({ activeKey: "store", pageTitle: "Store" });

      function renderOrders() {
        const orders = Store.getOrders();
        const empty = document.getElementById("ordersEmpty");
        const filled = document.getElementById("ordersFilled");
        const table = document.getElementById("ordersTable");
        if (!table) return;

        table.querySelectorAll('.dataTable__row').forEach(r => r.remove());

        if (orders.length === 0) {
          empty?.classList.remove("isHidden");
          filled?.classList.add("isHidden");
          return;
        }

        empty?.classList.add("isHidden");
        filled?.classList.remove("isHidden");

        orders.forEach(order => {
          const row = document.createElement("div");
          row.className = "dataTable__row";
          row.dataset.orderId = order.id;
          row.innerHTML = `
            <div>${escapeHtml(order.id)}</div>
            <div>${escapeHtml(order.userName)}</div>
            <div>${order.items.length}</div>
            <div>${order.totalPoints}PT</div>
            <div>${escapeHtml(order.status)}</div>
            <div>${escapeHtml(order.date)}</div>
            <div><button class="secondaryButton orderDetailsBtn" type="button">View</button></div>
          `;
          table.appendChild(row);
        });
      }

      renderOrders();

      document.addEventListener("click", (e) => {
        if (e.target.closest(".orderDetailsBtn")) {
          openOrderDetailsDrawer();
        }
      });
    </script>
  </body>
</html>
