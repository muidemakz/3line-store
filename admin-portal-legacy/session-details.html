<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3Line Store — Session Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Poppins:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <template id="page-template">
      <div class="pageBackRow">
        <a class="pageBack" href="./sessions.html">
          <span aria-hidden="true">←</span>
          <span>Back</span>
        </a>
      </div>

      <section class="cardSection">
        <h2 class="sectionTitle" id="sessionTitle">Session</h2>

        <div class="tabs">
          <button class="tab tab--active" type="button" data-tab-target="orders">Order list</button>
          <button class="tab" type="button" data-tab-target="shopping">Shopping list</button>
        </div>

        <!-- Orders tab -->
        <div class="tabContent tabContent--active" id="tab-orders">
          <div class="emptyState" id="ordersEmpty">
            <div class="emptyState__content">
              <img class="emptyState__icon" src="./assets/archive.svg" alt="" />
              <div class="emptyState__title">No Orders yet</div>
              <div class="emptyState__subtitle">Orders for this session will show here</div>
            </div>
          </div>

          <div class="ordersFilled isHidden" id="ordersFilled">
            <div class="tableFilterBar">
              <div class="tableFilterBar__left">
                <div class="tableSearch">
                  <span class="tableSearch__icon" aria-hidden="true">⌕</span>
                  <input class="tableSearch__input" placeholder="Search orders" />
                </div>
                <button class="tableFilterBtn" type="button">Date <span aria-hidden="true">▾</span></button>
                <button class="tableApplyBtn" type="button">Apply</button>
              </div>
              <button class="tableExportBtn" type="button">Export</button>
            </div>

            <div class="dataTable" id="ordersTable">
              <div class="dataTable__head">
                <div>Order</div>
                <div>Customer</div>
                <div>Items</div>
                <div>Total (PT)</div>
                <div>Status</div>
                <div>Date</div>
                <div>Actions</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Shopping list tab -->
        <div class="tabContent" id="tab-shopping">
          <div class="emptyState" id="shoppingEmpty">
            <div class="emptyState__content">
              <img class="emptyState__icon" src="./assets/archive.svg" alt="" />
              <div class="emptyState__title">No items yet</div>
              <div class="emptyState__subtitle">Items from orders will appear here</div>
            </div>
          </div>

          <div class="shoppingFilled isHidden" id="shoppingFilled">
            <div class="tableFilterBar">
              <div class="tableFilterBar__left">
                <div class="tableSearch">
                  <span class="tableSearch__icon" aria-hidden="true">⌕</span>
                  <input class="tableSearch__input" placeholder="Search items" />
                </div>
              </div>
              <button class="tableExportBtn" type="button">Export</button>
            </div>

            <div class="dataTable" id="shoppingTable">
              <div class="dataTable__head">
                <div>Item</div>
                <div>Unit</div>
                <div>Total Qty</div>
                <div>Points Each</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </template>

    <script src="./store.js"></script>
    <script src="./ui.js"></script>
    <script src="./app-layout.js"></script>
    <script>
      renderDashboardShell({ activeKey: "sessions", pageTitle: "Sessions" });

      // Tab switching
      const tabs = document.querySelectorAll(".tab");
      const contents = document.querySelectorAll(".tabContent");
      tabs.forEach(tab => {
        tab.addEventListener("click", () => {
          tabs.forEach(t => t.classList.remove("tab--active"));
          contents.forEach(c => c.classList.remove("tabContent--active"));
          tab.classList.add("tab--active");
          const content = document.getElementById("tab-" + tab.dataset.tabTarget);
          if (content) content.classList.add("tabContent--active");
        });
      });

      // Load session from URL param
      const sessionId = new URLSearchParams(location.search).get('id');
      const session = Store.getSessions().find(s => s.id === sessionId);

      if (session) {
        document.getElementById("sessionTitle").textContent = `Session: ${session.name}`;
      }

      // Render orders for this session
      function renderOrders() {
        const orders = Store.getOrders().filter(o => o.sessionId === sessionId);
        const empty = document.getElementById("ordersEmpty");
        const filled = document.getElementById("ordersFilled");
        const table = document.getElementById("ordersTable");
        if (!table) return;

        table.querySelectorAll('.dataTable__row').forEach(r => r.remove());

        if (orders.length === 0) {
          empty?.classList.remove("isHidden");
          filled?.classList.add("isHidden");
          return;
        }

        empty?.classList.add("isHidden");
        filled?.classList.remove("isHidden");

        orders.forEach(order => {
          const row = document.createElement("div");
          row.className = "dataTable__row";
          row.dataset.orderId = order.id;
          row.innerHTML = `
            <div>${escapeHtml(order.id)}</div>
            <div>${escapeHtml(order.userName)}</div>
            <div>${order.items.length}</div>
            <div>${order.totalPoints}PT</div>
            <div>${escapeHtml(order.status)}</div>
            <div>${escapeHtml(order.date)}</div>
            <div><button class="secondaryButton orderDetailsBtn" type="button">View</button></div>
          `;
          table.appendChild(row);
        });
      }

      // Render aggregated shopping list for this session
      function renderShoppingList() {
        const items = Store.getShoppingList(sessionId);
        const empty = document.getElementById("shoppingEmpty");
        const filled = document.getElementById("shoppingFilled");
        const table = document.getElementById("shoppingTable");
        if (!table) return;

        table.querySelectorAll('.dataTable__row').forEach(r => r.remove());

        if (items.length === 0) {
          empty?.classList.remove("isHidden");
          filled?.classList.add("isHidden");
          return;
        }

        empty?.classList.add("isHidden");
        filled?.classList.remove("isHidden");

        items.forEach(item => {
          const row = document.createElement("div");
          row.className = "dataTable__row";
          row.innerHTML = `
            <div>${escapeHtml(item.name)}</div>
            <div>${escapeHtml(item.unit || '-')}</div>
            <div>${item.qty}</div>
            <div>${item.points}PT</div>
          `;
          table.appendChild(row);
        });
      }

      renderOrders();
      renderShoppingList();

      document.addEventListener("click", (e) => {
        if (e.target.closest(".orderDetailsBtn")) {
          openOrderDetailsDrawer();
        }
      });
    </script>
  </body>
</html>
