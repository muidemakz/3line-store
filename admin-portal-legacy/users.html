<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3Line Store — Users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Poppins:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <template id="page-template">
      <div class="panelHeader">
        <div class="showingLabel">Showing: <strong>All Users</strong></div>
        <div class="dropdownWrapper">
          <button class="adminActionBtn" id="addUserBtnTop" type="button">
            <img class="adminActionBtn__icon" src="./assets/plus.svg" alt="" />
            <span>Add New User</span>
          </button>
          <div class="dropdownMenu" id="addUserDropdown">
            <button class="dropdownItem" id="addUserSingleBtn" type="button">Single</button>
            <button class="dropdownItem" id="addUserBulkBtn" type="button">Bulk Upload</button>
          </div>
        </div>
      </div>

      <section class="cardSection cardSection--large" id="usersEmpty">
        <div class="emptyState__content">
          <img class="emptyState__icon" src="./assets/archive.svg" alt="" />
          <div class="emptyState__title">No User yet</div>
          <div class="emptyState__subtitle">Users will show here</div>
        </div>
      </section>

      <div class="usersFilled isHidden" id="usersFilled">
        <div class="tableFilterBar">
          <div class="tableFilterBar__left">
            <div class="tableSearch">
              <span class="tableSearch__icon" aria-hidden="true">⌕</span>
              <input class="tableSearch__input" placeholder="Search name" />
            </div>
            <button class="tableFilterBtn" type="button">Type <span aria-hidden="true">▾</span></button>
            <button class="tableApplyBtn" type="button">Apply</button>
          </div>
          <button class="tableExportBtn" type="button">Export</button>
        </div>

        <div class="dataTable" id="usersTable">
          <div class="dataTable__head">
            <div>User's Name</div>
            <div>Email</div>
            <div>User Type</div>
            <div>Grade Level</div>
            <div>Points</div>
            <div>Date Added</div>
            <div>Actions</div>
          </div>
        </div>
      </div>
    </template>

    <script src="./store.js"></script>
    <script src="./ui.js"></script>
    <script src="./app-layout.js"></script>
    <script>
      renderDashboardShell({ activeKey: "users", pageTitle: "Users" });

      function renderUsers() {
        const users = Store.getUsers();
        const empty = document.getElementById("usersEmpty");
        const filled = document.getElementById("usersFilled");
        const table = document.getElementById("usersTable");
        if (!table) return;

        table.querySelectorAll('.dataTable__row').forEach(r => r.remove());

        if (users.length === 0) {
          empty?.classList.remove("isHidden");
          filled?.classList.add("isHidden");
          return;
        }

        empty?.classList.add("isHidden");
        filled?.classList.remove("isHidden");

        users.forEach(user => {
          const row = document.createElement("div");
          row.className = "dataTable__row dataTable__row--clickable";
          row.dataset.userId = user.id;
          row.innerHTML = `
            <div>${escapeHtml(user.name)}</div>
            <div>${escapeHtml(user.email)}</div>
            <div>${escapeHtml(user.type)}</div>
            <div>${escapeHtml(user.gradeLevel)}</div>
            <div>${user.points}PT</div>
            <div>${escapeHtml(user.dateAdded)}</div>
            <div>${renderTableActions(["View User", "Edit User", "Deactivate", "Delete User"])}</div>
          `;
          table.appendChild(row);
        });
      }

      renderUsers();

      const addUserBtnTop = document.getElementById("addUserBtnTop");
      const addUserDropdown = document.getElementById("addUserDropdown");

      addUserBtnTop?.addEventListener("click", (e) => {
        e.stopPropagation();
        addUserBtnTop.classList.toggle("adminActionBtn--active");
        addUserDropdown?.classList.toggle("dropdownMenu--open");
      });

      document.addEventListener("click", (e) => {
        if (!addUserBtnTop?.contains(e.target) && !addUserDropdown?.contains(e.target)) {
          addUserBtnTop?.classList.remove("adminActionBtn--active");
          addUserDropdown?.classList.remove("dropdownMenu--open");
        }
      });

      document.getElementById("addUserBulkBtn")?.addEventListener("click", () => {
        addUserBtnTop?.classList.remove("adminActionBtn--active");
        addUserDropdown?.classList.remove("dropdownMenu--open");
        openUploadBulkModal({
          onSubmit: () => showSuccessToast("Submitted Successfully")
        });
      });

      document.getElementById("addUserSingleBtn")?.addEventListener("click", () => {
        addUserBtnTop?.classList.remove("adminActionBtn--active");
        addUserDropdown?.classList.remove("dropdownMenu--open");
        openAddSingleUserModal({ onSubmit: handleUserSubmit });
      });

      function handleUserSubmit(data) {
        Store.addUser(data);
        showSuccessToast("User added successfully");
        renderUsers();
      }

      document.getElementById("usersTable")?.addEventListener("click", (e) => {
        const actionItem = e.target.closest(".rowActionItem");
        const dotsInner = e.target.closest(".tableActionDots");
        const row = e.target.closest(".dataTable__row");

        if (actionItem) {
          const action = actionItem.dataset.action;
          const userName = row?.querySelector("div:first-child")?.textContent || "User";

          if (action === "delete-user" || action === "deactivate") {
            const isDeactivate = action === "deactivate";
            openDeleteConfirmModal({
              title: isDeactivate ? "Deactivate User" : "Delete User",
              message: `Are you sure you want to ${isDeactivate ? "deactivate" : "delete"} "${userName}"?`,
              onConfirm: () => {
                deleteRow(actionItem, "usersEmpty", "usersFilled");
                showToast(`User ${isDeactivate ? "deactivated" : "deleted"} successfully`, "success");
              }
            });
          }
          return;
        }

        if (dotsInner) return;
      });
    </script>
  </body>
</html>
